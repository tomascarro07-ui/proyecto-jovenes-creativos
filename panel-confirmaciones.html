<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Panel · Confirmaciones y Playlist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Raleway:wght@300;400;500;700&family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
:root{
  --rose-old:#b5737a; --rose-deep:#8b4a52;
  --gold:#a97824; --gold-light:#d4a94e; --gold-pale:#f7f0e0; --gold-deep:#7d5a1a;
  --cream:#fdf8f2;
  --text:#3a2a1e; --text2:#6b4e3d; --text3:#9a7a68;
  --card-bg:rgba(253,248,242,0.9); --bordo:#5c1a1f;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:linear-gradient(160deg,#f2e0d4,#f8ede0);
  min-height:100vh;
  font-family:'Cormorant Garamond',serif;color:var(--text);
  padding:40px 16px 60px;
}
.panel-header{text-align:center;margin-bottom:30px;}
.panel-badge{display:inline-block;font-family:'Raleway',sans-serif;font-size:10px;font-weight:700;letter-spacing:6px;color:var(--gold-deep);text-transform:uppercase;background:rgba(169,120,36,.14);padding:5px 18px;border-radius:50px;border:1.5px solid rgba(169,120,36,.5);margin-bottom:14px;}
.panel-title{font-family:'Pinyon Script',cursive;font-size:clamp(42px,10vw,64px);color:var(--rose-deep);line-height:1;}
.gold-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0;}

/* TABS */
.tabs{display:flex;justify-content:center;gap:10px;max-width:460px;margin:28px auto 0;}
.tab-btn{
  flex:1;padding:13px 10px;border-radius:50px;border:1.5px solid rgba(169,120,36,.4);
  background:rgba(253,248,242,.7);color:var(--gold-deep);
  font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;transition:all .25s;
}
.tab-btn.active{background:linear-gradient(135deg,var(--gold) 0%,#a8803c 60%,var(--rose-old) 100%);color:var(--cream);border-color:transparent;box-shadow:0 6px 20px rgba(169,120,36,.3);}
.tab-btn:not(.active):hover{background:rgba(169,120,36,.1);}

/* CONTENEDOR */
.muro-wrapper{max-width:460px;margin:26px auto 0;display:none;}
.muro-wrapper.active{display:block;}

.pagina-indicador{text-align:center;font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold-deep);text-transform:uppercase;margin-bottom:16px;}
.total-count{text-align:center;font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--text2);margin-bottom:18px;}
.total-count strong{color:var(--gold-deep);font-style:normal;}

#muro{display:flex;flex-direction:column;gap:14px;}

.mensaje{
  padding:18px 20px;border-radius:16px;
  background:var(--card-bg);
  border:1px solid rgba(201,169,110,.3);
  box-shadow:0 6px 20px rgba(169,120,36,.1);
  opacity:0;transform:translateY(10px);
  animation:aparecer .45s ease forwards;
  position:relative;
}
.mensaje::before{content:'✦';position:absolute;top:10px;right:14px;color:var(--gold);opacity:.4;font-size:12px;}
.linea{margin-bottom:5px;font-size:16px;}
.linea:last-child{margin-bottom:0;}
.label{font-family:'Raleway',sans-serif;font-size:9px;letter-spacing:2px;color:var(--gold-deep);text-transform:uppercase;font-weight:700;margin-right:6px;}
.nombre{font-family:'Playfair Display',serif;font-weight:600;font-size:18px;color:var(--dark,#3a2a1e);}
.no-data{text-align:center;font-style:italic;color:var(--text3);padding:30px 0;}

/* CONTROLES */
.controles{display:flex;justify-content:space-between;margin-top:20px;gap:10px;}
.controles button{
  flex:1;padding:12px 18px;border-radius:50px;border:1.5px solid rgba(169,120,36,.45);
  background:transparent;color:var(--gold-deep);cursor:pointer;
  font-family:'Raleway',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;transition:all .2s;
}
.controles button:hover{background:rgba(169,120,36,.1);}
#prevBtn1,#nextBtn1,#prevBtn2,#nextBtn2{display:none;}

@keyframes aparecer{to{opacity:1;transform:translateY(0);}}

.refresh-btn{
  display:block;margin:22px auto 0;padding:11px 26px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--gold) 0%,#a8803c 60%,var(--rose-old) 100%);
  color:var(--cream);font-family:'Playfair Display',serif;font-size:14px;font-weight:600;
  letter-spacing:1px;cursor:pointer;box-shadow:0 6px 20px rgba(169,120,36,.28);transition:transform .2s;
}
.refresh-btn:hover{transform:translateY(-2px);}

@media(max-width:480px){
  .panel-title{font-size:48px;}
  .tabs{max-width:100%;}
}
</style>
</head>
<body>

<div class="panel-header">
  <span class="panel-badge">✦ panel privado ✦</span>
  <p class="panel-title">Natalí</p>
  <div class="gold-line"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tabBtn1" onclick="showTab(1)">✅ Confirmados</button>
  <button class="tab-btn" id="tabBtn2" onclick="showTab(2)">🎵 Playlist</button>
</div>

<!-- RSVP -->
<div class="muro-wrapper active" id="wrap1">
  <p class="total-count" id="totalCount1"></p>
  <div id="paginaInfo1" class="pagina-indicador"></div>
  <div id="muro1"></div>
  <div class="controles">
    <button id="prevBtn1" onclick="prev(1)">⬅ Anterior</button>
    <button id="nextBtn1" onclick="next(1)">Siguiente ➡</button>
  </div>
  <button class="refresh-btn" onclick="cargar(1)">↻ Actualizar</button>
</div>

<!-- CANCIONES -->
<div class="muro-wrapper" id="wrap2">
  <p class="total-count" id="totalCount2"></p>
  <div id="paginaInfo2" class="pagina-indicador"></div>
  <div id="muro2"></div>
  <div class="controles">
    <button id="prevBtn2" onclick="prev(2)">⬅ Anterior</button>
    <button id="nextBtn2" onclick="next(2)">Siguiente ➡</button>
  </div>
  <button class="refresh-btn" onclick="cargar(2)">↻ Actualizar</button>
</div>

<script>
/* URLs de tus 2 Apps Script (GET) */
const URL_RSVP  = "REEMPLAZAR_CON_URL_RSVP";   // debe tener función doGet()
const URL_SONG  = "REEMPLAZAR_CON_URL_CANCION"; // debe tener función doGet()

const POR_PAGINA = window.innerWidth < 600 ? 5 : 10;

const estado = {
  1:{pagina:0,datos:[],url:URL_RSVP,tipoLabel:'Nombre',tipoLabel2:'Dato'},
  2:{pagina:0,datos:[],url:URL_SONG,tipoLabel:'Canción',tipoLabel2:'Link'}
};

function showTab(n){
  document.getElementById('tabBtn1').classList.toggle('active', n===1);
  document.getElementById('tabBtn2').classList.toggle('active', n===2);
  document.getElementById('wrap1').classList.toggle('active', n===1);
  document.getElementById('wrap2').classList.toggle('active', n===2);
}

function cargar(n){
  const st=estado[n];
  fetch(st.url + "?t=" + Date.now())
    .then(r=>r.json())
    .then(data=>{
      st.datos = Array.isArray(data) ? data.reverse() : [];
      st.pagina = 0;
      render(n);
    })
    .catch(()=>{
      document.getElementById('muro'+n).innerHTML = '<p class="no-data">No se pudo cargar la información. Verificá la URL del Apps Script.</p>';
    });
}

function render(n){
  const st=estado[n];
  const muro=document.getElementById('muro'+n);
  const info=document.getElementById('paginaInfo'+n);
  const total=document.getElementById('totalCount'+n);
  muro.innerHTML='';

  total.innerHTML = n===1
    ? `<strong>${st.datos.length}</strong> persona${st.datos.length===1?'':'s'} confirmada${st.datos.length===1?'':'s'}`
    : `<strong>${st.datos.length}</strong> canción${st.datos.length===1?'':'es'} sugerida${st.datos.length===1?'':'s'}`;

  if(st.datos.length===0){
    muro.innerHTML='<p class="no-data">Todavía no hay confirmaciones 🌹</p>';
    info.innerText='';
    document.getElementById('prevBtn'+n).style.display='none';
    document.getElementById('nextBtn'+n).style.display='none';
    return;
  }

  const totalPaginas=Math.ceil(st.datos.length/POR_PAGINA);
  const inicio=st.pagina*POR_PAGINA;
  const fin=inicio+POR_PAGINA;
  info.innerText=`Página ${st.pagina+1} de ${totalPaginas}`;

  st.datos.slice(inicio,fin).forEach((m,i)=>{
    const div=document.createElement('div');
    div.className='mensaje';
    div.style.animationDelay=`${i*0.06}s`;
    div.innerHTML=`
      <div class="linea"><span class="label">${st.tipoLabel}</span><span class="nombre">${m.nombre || "Anónimo"}</span></div>
      <div class="linea"><span class="label">${st.tipoLabel2}</span><span>${m.mensaje || "-"}</span></div>
    `;
    muro.appendChild(div);
  });

  document.getElementById('prevBtn'+n).style.display = st.pagina===0 ? 'none' : 'inline-block';
  document.getElementById('nextBtn'+n).style.display = fin<st.datos.length ? 'inline-block' : 'none';
}

function next(n){ estado[n].pagina++; render(n); }
function prev(n){ estado[n].pagina--; render(n); }

cargar(1);
cargar(2);
</script>
</body>
</html>
